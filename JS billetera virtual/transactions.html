<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NeonWallet - Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card wallet-card p-4">
                    <h2 class="text-center mb-4">📊 Últimos Movimientos</h2>
                    
                    <div id="transactionsContainer" class="list-group list-group-flush mb-4" style="max-height: 300px; overflow-y: auto;">
                        </div>

                    <div class="d-grid">
                        <a href="menu.html" class="btn btn-neon-primary">Volver al Menú Principal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cargar movimientos desde LocalStorage
        const container = document.getElementById('transactionsContainer');
        const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');

        if(transactions.length === 0) {
            container.innerHTML = `<p class="text-center text-muted">Aún no hay operaciones registradas.</p>`;
        } else {
            transactions.forEach(t => {
                const isDeposit = t.type === 'deposit';
                const badgeClass = isDeposit ? 'bg-success text-white' : 'bg-danger text-white';
                const prefix = isDeposit ? '+' : '-';
                
                container.innerHTML += `
                    <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-3 bg-transparent text-white border-secondary">
                        <div>
                            <h6 class="mb-0 fw-bold">${t.details}</h6>
                            <small class="text-info">${t.date}</small>
                        </div>
                        <span class="badge ${badgeClass} p-2 rounded-pill fw-bold">${prefix}$${t.amount.toLocaleString('es-CL')}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
