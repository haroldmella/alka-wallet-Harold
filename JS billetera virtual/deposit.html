<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NeonWallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div id="alertBox" class="custom-alert" style="background-color: #00dfa2; color: #000;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card wallet-card p-4">
                    <h2 class="text-center mb-4">🤑 Depositar</h2>
                    
                    <form id="depositForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-info">¿Cuánto vas a cargar?</label>
                            <input type="number" id="depositAmount" class="form-control bg-dark text-white border-secondary form-control-lg text-center" placeholder="$0" required min="1">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-neon-primary">🚀 Realizar depósito</button>
                            <a href="menu.html" class="btn btn-outline-secondary text-white border-0 mt-2">Volver</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('depositForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (amount <= 0 || isNaN(amount)) {
                alert("Monto inválido");
                return;
            }

            // Lógica de actualización
            let currentBalance = parseFloat(localStorage.getItem('balance') || '0');
            let newBalance = currentBalance + amount;
            localStorage.setItem('balance', newBalance);

            // Guardar en el historial
            let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.unshift({
                type: 'deposit',
                amount: amount,
                details: 'Depósito Realizado',
                date: 'Hoy mismo'
            });
            localStorage.setItem('transactions', JSON.stringify(transactions));

            // Feedback visual vivo
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = `¡PUM! Cargaste $${amount}. Redirigiendo... 🎆`;
            alertBox.style.display = 'block';

            setTimeout(() => {
                window.location.href = 'menu.html';
            }, 1500);
        });
    </script>
</body>
</html>
