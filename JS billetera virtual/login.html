<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NeonWallet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div id="alertBox" class="custom-alert"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card wallet-card p-4 text-center">
                    <h2 class="mb-4">⚡ Inicio de sesión</h2>
                    
                    <form id="loginForm">
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold text-info">Email de prueba:</label>
                            <input type="email" id="email" class="form-control bg-dark text-white border-secondary" placeholder="admin@billetera.com" required>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold text-info">Contraseña de prueba:</label>
                            <input type="password" id="password" class="form-control bg-dark text-white border-secondary" placeholder="1234" required>
                        </div>
                        <button type="submit" class="btn btn-neon-primary w-100 py-3">¡Iniciar Sesión! 🚀</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicializar datos por defecto en LocalStorage si no existen
        if(!localStorage.getItem('balance')) {
            localStorage.setItem('balance', '150000');
            localStorage.setItem('transactions', JSON.stringify([
                {type: 'deposit', amount: 50000, details: 'Depósito inicial', date: 'Hoy'}
            ]));
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            // Validación de credenciales
            if(email === 'admin@billetera.com' && pass === '1234') {
                alertBox.style.backgroundColor = '#00dfa2';
                alertBox.style.color = '#000';
                alertBox.innerText = "¡Éxito! Entrando a la matriz... 🤖";
                alertBox.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 1500);
            } else {
                alertBox.style.backgroundColor = '#ff007f';
                alertBox.style.color = '#fff';
                alertBox.innerText = "🚨 ¡Credenciales incorrectas! Inténtalo de nuevo.";
                alertBox.style.display = 'block';
                setTimeout(() => { alertBox.style.display = 'none'; }, 2500);
            }
        });
    </script>
</body>
</html>
