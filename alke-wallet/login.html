<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <h2 class="text-center mb-4 text-primary">Iniciar Sesión</h2>
        <div id="alert-container"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $('#loginForm').submit(function (evento) {
            evento.preventDefault();
            let correo = $('#email').val().trim();
            let contrasena = $('#password').val().trim();

            if (correo === "" || contrasena === "") {
                let alertaErr = '<div class="alert alert-danger">Campos incompletos</div>';
                $('#alert-container').html(alertaErr);
                return;
            }

            $.getJSON('http://localhost:3000/usuarios', function (usuarios) {
                let usuarioValido = usuarios.find(u => u.email === correo && u.password === contrasena);

                if (usuarioValido) {
                    let alertaSuc = '<div class="alert alert-success">Redirigiendo...</div>';
                    $('#alert-container').html(alertaSuc);
                    setTimeout(function () {
                        window.location.href = './menu.html';
                    }, 1500);
                } else {
                    let alertaInvalido = '<div class="alert alert-danger">Credenciales incorrectas</div>';
                    $('#alert-container').html(alertaInvalido);
                }
            }).fail(function () {
                let alertaServidor = '<div class="alert alert-danger">Error al conectar con el servidor JSON-Server</div>';
                $('#alert-container').html(alertaServidor);
            });
        });
    </script>
</body>

</html>
