<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Menú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5 text-center" style="max-width: 500px;">
        <h1 class="mb-4 text-primary">Alke Wallet</h1>

        <div class="card bg-primary text-white p-4 mb-4 shadow">
            <h5>Saldo Disponible</h5>
            <h2 id="saldoDisplay">$0</h2>
        </div>

        <div id="leyendaRedireccion" class="alert alert-info d-none" role="alert"></div>

        <div class="d-grid gap-3">
            <button id="btnDeposit" class="btn btn-success btn-lg">Depositar</button>
            <button id="btnSend" class="btn btn-warning btn-lg text-white">Enviar Dinero</button>
            <button id="btnTransactions" class="btn btn-secondary btn-lg">Últimos Movimientos</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            let saldoActual = localStorage.getItem('saldo') || "0";
            $('#saldoDisplay').text('$' + parseFloat(saldoActual).toLocaleString('es-CL'));

            function navegarA(pantalla, archivo) {
                $('#leyendaRedireccion').removeClass('d-none').text('Redirigiendo a ' + pantalla);
                setTimeout(function () {
                    window.location.href = archivo;
                }, 1500);
            }

            $('#btnDeposit').click(function () {
                navegarA('Depositar', './deposit.html');
            });

            $('#btnSend').click(function () {
                navegarA('Enviar Dinero', './sendmoney.html');
            });

            $('#btnTransactions').click(function () {
                navegarA('Últimos Movimientos', './transactions.html');
            });
        });
    </script>
</body>

</html>
