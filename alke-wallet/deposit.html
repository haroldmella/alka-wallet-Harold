<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5" style="max-width: 500px;">
        <div class="card p-4 shadow">
            <h3 class="mb-4 text-success">Depositar Fondos</h3>
            <div id="alert-container"></div>

            <div class="mb-3">
                <label class="form-label">Saldo Actual</label>
                <input type="text" id="saldoActualInput" class="form-control" disabled>
            </div>

            <form id="depositForm">
                <div class="mb-3">
                    <label for="monto" class="form-label">Monto a Depositar</label>
                    <input type="number" id="monto" class="form-control" min="1" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Confirmar</button>
            </form>

            <p id="leyendaMonto" class="mt-3 text-center text-muted d-none"></p>
            <a href="./menu.html" class="btn btn-link w-100 mt-2">Volver</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            let saldoActualNum = 0;

            $.getJSON('http://localhost:3000/usuarios/1', function (usuario) {
                saldoActualNum = parseFloat(usuario.saldo);
                $('#saldoActualInput').val('$' + saldoActualNum.toLocaleString('es-CL'));
            });

            $('#depositForm').submit(function (e) {
                e.preventDefault();
                let montoADepositar = parseFloat($('#monto').val());

                if (isNaN(montoADepositar) || montoADepositar <= 0) {
                    return;
                }

                let nuevoSaldo = saldoActualNum + montoADepositar;

                $.ajax({
                    url: 'http://localhost:3000/usuarios/1',
                    type: 'PATCH',
                    contentType: 'application/json',
                    data: JSON.stringify({ saldo: nuevoSaldo }),
                    success: function () {
                        let nuevaTransaccion = {
                            tipo: 'deposito',
                            monto: montoADepositar,
                            detalle: 'Depósito de fondos'
                        };

                        $.ajax({
                            url: 'http://localhost:3000/transacciones',
                            type: 'POST',
                            contentType: 'application/json',
                            data: JSON.stringify(nuevaTransaccion),
                            success: function () {
                                $('#leyendaMonto').removeClass('d-none').text('Monto depositado: $' + montoADepositar.toLocaleString('es-CL'));
                                let exitoAlert = '<div class="alert alert-success">Depósito realizado con éxito</div>';
                                $('#alert-container').html(exitoAlert);

                                setTimeout(function () {
                                    window.location.href = './menu.html';
                                }, 2000);
                            }
                        });
                    }
                });
            });
        });
    </script>
</body>

</html>
