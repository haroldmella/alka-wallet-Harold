<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Digital - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <h2 class="text-center mb-4 text-primary">Iniciar Sesión</h2>

        <div id="alert-container"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="******" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Inicializamos un saldo ficticio en el Local Storage si no existe todavía
        if (localStorage.getItem('saldo') === null) {
            localStorage.setItem('saldo', '50000'); // Saldo inicial de $50,000
        }

        // Usamos jQuery para manejar el evento de envío (submit) del formulario
        $('#loginForm').submit(function (evento) {
            // EVITAR ERROR COMÚN: Detener el envío automático de la página
            evento.preventDefault();

            // Usamos selectores de jQuery para obtener los valores directamente
            let correo = $('#email').val().trim();
            let contrasena = $('#password').val().trim();

            // Validación básica
            if (correo === "" || contrasena === "") {
                mostrarAlerta("Por favor, completa todos los campos.", "danger");
                return;
            }

            // Simulamos una validación exitosa
            mostrarAlerta("¡Inicio de sesión exitoso! Redirigiendo...", "success");

            // Uso de jQuery junto con window.location para redirigir tras 1.5 segundos
            setTimeout(function () {
                window.location.href = './menu.html';
            }, 1500);
        });

        // Función para crear alertas dinámicas de Bootstrap con jQuery
        function mostrarAlerta(mensaje, tipo) {
            let alertaHtml = `
                <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                    ${mensaje}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            $('#alert-container').html(alertaHtml);
        }
    </script>
</body>

</html>
