<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Digital - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .contacto-item {
            cursor: pointer;
            transition: 0.2s;
        }

        .contacto-item:hover {
            background-color: #f0f0f0;
        }

        .seleccionado {
            background-color: #d1e7dd !important;
            border-color: #badbcc;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container py-5" style="max-width: 600px;">
        <div class="card p-4 shadow">
            <h3 class="mb-4 text-warning text-dark">Enviar Dinero</h3>

            <div class="mb-3">
                <input type="text" id="searchContact" class="form-control" placeholder="Buscar por nombre o alias...">
            </div>

            <h5>Selecciona un contacto:</h5>
            <ul class="list-group mb-3" id="listaContactos">
                <li class="list-group-item contacto-item" data-nombre="Juan Perez" data-alias="juan.pago">Juan Perez
                    (Alias: juan.pago) - CBU: 1234567890123456789012</li>
                <li class="list-group-item contacto-item" data-nombre="Maria Lopez" data-alias="maria.cash">Maria Lopez
                    (Alias: maria.cash) - CBU: 9876543210987654321098</li>
                <li class="list-group-item contacto-item" data-nombre="Carlos Sosa" data-alias="carlos.wallet">Carlos
                    Sosa (Alias: carlos.wallet) - CBU: 1111111111111111111111</li>
            </ul>

            <button id="btnEnviarDinero" class="btn btn-warning w-100 mb-4 d-none">Enviar dinero al contacto
                seleccionado</button>

            <hr>

            <button id="btnMostrarFormContacto" class="btn btn-outline-primary w-100 mb-3">Agregar nuevo
                contacto</button>

            <div id="formContactoContainer" class="card p-3 bg-white border d-none">
                <h5>Nuevo Contacto</h5>
                <form id="newContactForm">
                    <div class="mb-2">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="newNombre" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Alias</label>
                        <input type="text" id="newAlias" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Número CBU (Debe tener 22 dígitos)</label>
                        <input type="text" id="newCbu" class="form-control" maxlength="22" required>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-success w-50">Guardar</button>
                        <button type="button" id="btnCancelarContacto" class="btn btn-danger w-50">Cancelar</button>
                    </div>
                </form>
            </div>

            <div id="mensajeConfirmacion" class="alert alert-success mt-3 d-none" role="alert"></div>

            <a href="./menu.html" class="btn btn-link w-100 mt-3">Volver al Menú</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        // 1. Mostrar y ocultar el formulario de nuevo contacto
        $('#btnMostrarFormContacto').click(function () {
            $('#formContactoContainer').removeClass('d-none');
        });

        $('#btnCancelarContacto').click(function () {
            $('#formContactoContainer').addClass('d-none');
            $('#newContactForm')[0].reset(); // Limpia los inputs del formulario
        });

        // 2. Validar y agregar nuevo contacto
        $('#newContactForm').submit(function (e) {
            e.preventDefault();

            let nombre = $('#newNombre').val().trim();
            let alias = $('#newAlias').val().trim();
            let cbu = $('#newCbu').val().trim();

            // Validación estricta de CBU de 22 dígitos numéricos
            let cbuRegex = /^[0-9]{22}$/;
            if (!cbuRegex.test(cbu)) {
                alert("Error de interpretación: El CBU debe contener exactamente 22 números.");
                return;
            }

            // Si pasa la validación, lo añadimos dinámicamente a la lista HTML usando jQuery
            let nuevoItem = `
                <li class="list-group-item contacto-item" data-nombre="${nombre}" data-alias="${alias}">
                    ${nombre} (Alias: ${alias}) - CBU: ${cbu}
                </li>
            `;
            $('#listaContactos').append(nuevoItem);

            // Ocultamos el formulario y limpiamos
            $('#formContactoContainer').addClass('d-none');
            $('#newContactForm')[0].reset();
    </script>

    <script>
            // 3. Realizar búsqueda en la agenda (Filtro en tiempo real)
            $('#searchContact').on('keyup', function () {
                let valorBusqueda = $(this).val().toLowerCase();

                $('#listaContactos .contacto-item').each(function () {
                    let nombre = $(this).attr('data-nombre').toLowerCase();
                    let alias = $(this).attr('data-alias').toLowerCase();

                    // Si el nombre o el alias contienen lo buscado, se muestra, si no se oculta
                    if (nombre.indexOf(valorBusqueda) > -1 || alias.indexOf(valorBusqueda) > -1) {
                        $(this).removeClass('d-none');
                    } else {
                        $(this).addClass('d-none');
                    }
                });
            });

            // 4. Mostrar y ocultar botón "Enviar dinero" al seleccionar contacto
            // Usamos delegación de eventos con $(document).on porque los contactos pueden ser nuevos
            $(document).on('click', '.contacto-item', function () {
                // Quitamos la selección a cualquier otro elemento
                $('.contacto-item').removeClass('seleccionado');
                // Añadimos la clase seleccionada al actual
                $(this).addClass('seleccionado');
                // Mostramos el botón oculto
                $('#btnEnviarDinero').removeClass('d-none');
            });

            // 5. Mensaje de confirmación de envío
            $('#btnEnviarDinero').click(function () {
                let contactoSeleccionado = $('.seleccionado').attr('data-nombre');

                $('#mensajeConfirmacion')
                    .removeClass('d-none')
                    .text(`¡Envío realizado con éxito a ${contactoSeleccionado}!`);

                // Ocultamos el botón tras el envío
                $('#btnEnviarDinero').addClass('d-none');
                $('.contacto-item').removeClass('seleccionado');
            });
    </script>
</body>

</html>
