<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Digital - Depositar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card p-4 mx-auto shadow" style="max-width: 500px;">
            <h3 class="mb-4 text-success">Realizar Depósito</h3>
            
            <div id="alert-container"></div>

            <div class="mb-3">
                <label class="form-label font-weight-bold">Tu Saldo Actual:</label>
                <input type="text" id="saldoActualInput" class="form-control bg-light" disabled>
            </div>

            <form id="depositForm">
                <div class="mb-3">
                    <label for="monto" class="form-label">Monto a Depositar:</label>
                    <input type="number" id="monto" class="form-control" placeholder="Ej: 10000" min="1" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Confirmar Depósito</button>
            </form>

            <p id="leyendaMonto" class="mt-3 text-center text-muted font-italic d-none"></p>
            
            <a href="./menu.html" class="btn btn-link w-100 mt-2">Volver al Menú</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        // 1. Al cargar la página: Obtener saldo del Local Storage y mostrarlo en el input deshabilitado
        let saldoEnMemoria = parseFloat(localStorage.getItem('saldo')) || 0;
        $('#saldoActualInput').val('$' + saldoEnMemoria.toLocaleString('es-CL'));

        // 2. Procesar el formulario de depósito
        $('#depositForm').submit(function(e) {
            e.preventDefault();

            let montoADepositar = parseFloat($('#monto').val());

            if (isNaN(montoADepositar) || montoADepositar <= 0) {
                let errorAlert = `<div class="alert alert-danger">Monto inválido</div>`;
                $('#alert-container').html(errorAlert);
                return;
            }

            // Calculamos el nuevo saldo
            let nuevoSaldo = saldoEnMemoria + montoADepositar;

            // Guardamos el nuevo saldo en el Local Storage convirtiéndolo a String
            localStorage.setItem('saldo', nuevoSaldo.toString());

            // Agregar una leyenda con el monto depositado debajo del formulario
            $('#leyendaMonto')
                .removeClass('d-none')
                .text(`¡Has depositado con éxito un monto de $${montoADepositar.toLocaleString('es-CL')}!`);

            // Mejoras en el mensaje de éxito usando Alerta de Bootstrap creada dinámicamente
            let exitoAlert = `
                <div class="alert alert-success" role="alert">
                    ¡Depósito procesado de forma segura!
                </div>
            `;
            $('#alert-container').html(exitoAlert);

            // Redirigir al usuario al menú principal después de un retraso de 2 segundos (2000 ms)
            setTimeout(function() {
                window.location.href = './menu.html';
            }, 2000);
        });
    </script>
</body>
</html>
