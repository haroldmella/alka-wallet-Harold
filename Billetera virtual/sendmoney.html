<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Digital - Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card wallet-card p-4">
                    <h2 class="text-center">Enviar Dinero</h2>
                    
                    <form class="mb-4">
                        <label class="form-label fw-semibold">Buscar en agenda de transferencias</label>
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="Nombre o Rut del contacto...">
                            <button class="btn btn-outline-secondary" type="submit">Buscar</button>
                        </div>
                    </form>

                    <div class="d-grid gap-2 mb-4">
                        <button type="button" class="btn btn-wallet-secondary" data-bs-toggle="modal" data-bs-target="#newContactModal">
                            + Agregar nuevo contacto
                        </button>
                    </div>

                    <div class="text-center">
                        <a href="menu.html" class="btn btn-light text-muted w-100">Volver al menú</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="newContactModal" tabindex="-1" aria-labelledby="newContactModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content style-modal p-2" style="border-radius: 16px;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="newContactModalLabel">Nuevo Contacto</h5>
                    <button type="button" class="btn-close" data-bs-shadow="none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email o Identificación</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-wallet-primary" data-bs-dismiss="modal">Guardar Contacto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
