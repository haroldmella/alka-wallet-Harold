<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetera Digital - Últimos Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card wallet-card p-4">
                    <h2 class="text-center mb-4">Últimos Movimientos</h2>
                    
                    <div class="list-group list-group-flush mb-4">
                        
                        <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-3">
                            <div>
                                <h6 class="mb-0 fw-semibold">Depósito Recibido</h6>
                                <small class="text-muted">Hoy, 14:20</small>
                            </div>
                            <span class="badge bg-success-subtle text-success p-2 rounded-pill fw-bold">+$50.000</span>
                        </div>

                        <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-3">
                            <div>
                                <h6 class="mb-0 fw-semibold">Transferencia a Juan Pérez</h6>
                                <small class="text-muted">Ayer, 18:05</small>
                            </div>
                            <span class="badge bg-danger-subtle text-danger p-2 rounded-pill fw-bold">-$12.500</span>
                        </div>

                        <div class="list-group-item d-flex justify-content-between align-items-center px-0 py-3">
                            <div>
                                <h6 class="mb-0 fw-semibold">Depósito Cajero</h6>
                                <small class="text-muted">05 de Junio, 10:00</small>
                            </div>
                            <span class="badge bg-success-subtle text-success p-2 rounded-pill fw-bold">+$100.000</span>
                        </div>
                        
                    </div>

                    <div class="d-grid">
                        <a href="menu.html" class="btn btn-wallet-primary">Volver al Menú Principal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
